          type: [string, 'null']
          format: date-time
        dispatchedAt:
          type: [string, 'null']
          format: date-time
        rejectedAt:
          type: [string, 'null']
          format: date-time
        notes:
          type: [string, 'null']
        createdAt:
          type: string
          format: date-time

    UpdateRestockOrderBody:
      type: object
