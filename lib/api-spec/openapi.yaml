      properties:
        merchantId:
          type: string
        grossSalesCop:
          type: integer
        cogsCop:
          type: integer
        grossProfitCop:
          type: integer
        profitMarginPercent:
          type: number
        marginPercent:
          type: number
          description: Alias for profitMarginPercent
        totalCommissionCop:
          type: integer
        netEarnedCop:
          type: integer
        totalPaidOutCop:
          type: integer
        pendingCop:
          type: integer
        payouts:
          type: array
          items:
            $ref: '#/components/schemas/MerchantPayout'

