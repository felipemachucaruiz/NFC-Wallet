    TopUp:
      type: object
      required: [id, braceletUid, amountCop, paymentMethod, status, newBalanceCop, newCounter, createdAt]
      properties:
        id:
          type: string
        braceletUid:
          type: string
        amountCop:
          type: integer
        paymentMethod:
          $ref: '#/components/schemas/PaymentMethod'
        performedByUserId:
          type: string
        wompiTransactionId:
          type: [string, 'null']
        status:
          type: string
          enum: [pending, completed, failed]
