          type: string
        eventId:
          type: string
        periodFrom:
          type: string
          format: date-time
        periodTo:
          type: string
          format: date-time
        grossSalesCop:
          type: integer
        commissionCop:
          type: integer
        netPayoutCop:
          type: integer
        paymentMethod:
          $ref: '#/components/schemas/PayoutPaymentMethod'
        referenceNote:
          type: [string, 'null']
        performedByUserId:
          type: string
        paidAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time

    CreatePayoutBody:
      type: object
      required: [merchantId, eventId, periodFrom, periodTo, paymentMethod, paidAt]
      properties:
        merchantId:
          type: string
        eventId:
          type: string
        periodFrom:
          type: string
          format: date-time
        periodTo:
          type: string
          format: date-time
        paymentMethod:
          $ref: '#/components/schemas/PayoutPaymentMethod'
        referenceNote:
          type: string
        paidAt:
          type: string
          format: date-time

    PayoutTransactionsResponse:
      type: object
      required: [payout, transactions]
      properties:
        payout:
          $ref: '#/components/schemas/MerchantPayout'
        transactions:
          type: array
          items:
            $ref: '#/components/schemas/TransactionLog'

    RefundMethodBreakdown:
      type: object
      required: [totalCop, count]
      properties:
        totalCop:
          type: integer
        count:
          type: integer

    RefundReport:
      type: object
      required: [totalRefundedCop, count, byRefundMethod]
      properties:
        totalRefundedCop:
          type: integer
        count:
          type: integer
        byRefundMethod:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/RefundMethodBreakdown'

    # ── Reports ───────────────────────────────────────────────────────────────
    RevenueReportRow:
      type: object
      required: [grossSalesCop, cogsCop, grossProfitCop, profitMarginPercent, commissionCop, netCop, transactionCount]
      properties:
        grossSalesCop:
          type: integer
        cogsCop:
          type: integer
        grossProfitCop:
          type: integer
        profitMarginPercent:
          type: number
        commissionCop:
          type: integer
        netCop:
          type: integer
        transactionCount:
          type: integer

    RevenueReport:
      type: object
      required: [totals, byMerchant]
      properties:
        totals:
          $ref: '#/components/schemas/RevenueReportRow'
        byMerchant:
          type: array
          items:
            type: object
            required: [merchantId, merchantName, data]
            properties:
              merchantId:
                type: string
              merchantName:
                type: string
              data:
                $ref: '#/components/schemas/RevenueReportRow'
              byLocation:
                type: array
                items:
                  type: object
                  required: [locationId, locationName, data]
                  properties:
                    locationId:
                      type: string
                    locationName:
                      type: string
                    data:
                      $ref: '#/components/schemas/RevenueReportRow'

    TopUpReport:
      type: object
      required: [totalCop, byPaymentMethod, byUser]
      properties:
        totalCop:
          type: integer
        byPaymentMethod:
          type: object
          additionalProperties:
            type: integer
        byUser:
          type: array
          items:
            type: object
            required: [userId, totalCop, count]
            properties:
              userId:
                type: string
              firstName:
                type: [string, 'null']
              lastName:
                type: [string, 'null']
              totalCop:
                type: integer
              count:
                type: integer

    InventoryReport:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            type: object
            required: [locationId, locationName, productId, productName, quantityOnHand, restockTrigger, isLowStock]
            properties:
              locationId:
                type: string
              locationName:
                type: string
              productId:
                type: string
              productName:
                type: string
              quantityOnHand:
                type: integer
              restockTrigger:
                type: integer
              isLowStock:
                type: boolean

    TamperReportBody:
      type: object
      required: [nfcUid]
      properties:
        nfcUid:
          type: string
        reason:
          type: string
        context:
          type: object
          additionalProperties: true

    SnapshotExport:
      type: object
      required: [eventId, exportedAt]
      properties:
        eventId:
          type: string
        exportedAt:
          type: string
          format: date-time
        event:
          $ref: '#/components/schemas/Event'
        merchants:
          type: array
          items:
            $ref: '#/components/schemas/Merchant'
        transactions:
          type: array
          items:
            $ref: '#/components/schemas/TransactionLog'
        topUps:
          type: array
          items:
            $ref: '#/components/schemas/TopUp'
        payouts:
          type: array
          items:
            $ref: '#/components/schemas/MerchantPayout'
