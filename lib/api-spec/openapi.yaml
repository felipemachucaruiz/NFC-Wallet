          type: integer
          minimum: 1

    TransactionLineItem:
      type: object
      required: [id, transactionLogId, productNameSnapshot, unitPriceSnapshot, unitCostSnapshot, quantity]
      properties:
        id:
          type: string
        transactionLogId:
          type: string
        productId:
          type: [string, 'null']
        productNameSnapshot:
          type: string
        unitPriceSnapshot:
          type: integer
        unitCostSnapshot:
          type: integer
        quantity:
          type: integer

    TransactionLog:
      type: object
      required: [id, idempotencyKey, braceletUid, locationId, merchantId, eventId, grossAmountCop, commissionAmountCop, netAmountCop, newBalanceCop, counter, createdAt]
      properties:
        id:
          type: string
        idempotencyKey:
          type: string
        braceletUid:
          type: string
        locationId:
          type: string
        merchantId:
          type: string
        eventId:
          type: string
        grossAmountCop:
          type: integer
        commissionAmountCop:
          type: integer
        netAmountCop:
          type: integer
        newBalanceCop:
          type: integer
        counter:
          type: integer
        performedByUserId:
          type: [string, 'null']
        offlineCreatedAt:
          type: [string, 'null']
          format: date-time
        syncedAt:
          type: [string, 'null']
          format: date-time
        createdAt:
          type: string
          format: date-time
        lineItems:
          type: array
          items:
            $ref: '#/components/schemas/TransactionLineItem'

    LogTransactionBody:
      type: object
      required: [idempotencyKey, nfcUid, locationId, newBalance, counter, lineItems]
      properties:
        idempotencyKey:
          type: string
          minLength: 1
        nfcUid:
          type: string
          minLength: 1
        locationId:
          type: string
        newBalance:
          type: integer
          minimum: 0
        counter:
          type: integer
          minimum: 0
        lineItems:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/TransactionLineItemInput'
        offlineCreatedAt:
          type: string
          format: date-time

    SyncTransactionsBody:
      type: object
      required: [transactions]
