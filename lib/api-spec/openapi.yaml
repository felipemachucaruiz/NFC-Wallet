components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string

  responses:
    BadRequest:
      description: Invalid request body or parameters.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Unauthorized:
      description: Not authenticated.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Forbidden:
      description: Insufficient permissions.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Conflict:
      description: Resource already exists.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    InternalError:
      description: Internal server error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'

  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string

    SuccessEnvelope:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          const: true

    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          const: true

    # ── Auth ──────────────────────────────────────────────────────────────────
    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl, role]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
          format: email
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']
        role:
          $ref: '#/components/schemas/UserRole'
        merchantId:
          type: [string, 'null']
          description: Set for merchant_admin and merchant_staff users; determines ownership scope
        eventId:
          type: [string, 'null']
          description: Set for event_admin users; determines which event they administer
        promoterCompanyId:
          type: [string, 'null']
          description: Set for event_admin users linked to a promoter company; determines which company's events they manage

    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'

    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
          minLength: 1
        code_verifier:
          type: string
          minLength: 1
        redirect_uri:
          type: string
          minLength: 1
          format: uri
        state:
          type: string
          minLength: 1
        nonce:
          type: string
          minLength: 1

    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string

    SigningKeyResponse:
      type: object
      required: [hmacSecret]
      properties:
        hmacSecret:
          type: string

    # ── Roles & Users ─────────────────────────────────────────────────────────
    UserRole:
      type: string
      enum: [attendee, bank, merchant_staff, merchant_admin, warehouse_admin, event_admin, admin]

    InventoryMode:
      type: string
      enum: [location_based, centralized_warehouse]

    MerchantType:
      type: string
      enum: [event_managed, external]

    UserProfile:
      type: object
      required: [id, role, createdAt]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']
        role:
          $ref: '#/components/schemas/UserRole'
        createdAt:
          type: string
          format: date-time

    UpdateUserRoleBody:
      type: object
      required: [role]
      properties:
        role:
          $ref: '#/components/schemas/UserRole'

    SuccessResponse:
      type: object
      required: [success]
      properties:
        success:
          type: boolean

    # ── Promoter Companies ────────────────────────────────────────────────────
    PromoterCompany:
      type: object
      required: [id, companyName, createdAt, updatedAt]
      properties:
        id:
          type: string
        companyName:
          type: string
        nit:
          type: [string, 'null']
        address:
          type: [string, 'null']
        phone:
          type: [string, 'null']
        email:
          type: [string, 'null']
          format: email
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    UpsertPromoterCompanyBody:
      type: object
      required: [companyName]
      properties:
        companyName:
          type: string
          minLength: 1
        nit:
          type: string
        address:
          type: string
        phone:
          type: string
        email:
          type: string
          format: email

    PromoterCompanySummary:
      type: object
      required: [companyId, companyName, eventCount, totalRevenueCop, totalTopupsCop, totalUnclaimedCop, totalAttendees]
      properties:
        companyId:
          type: string
        companyName:
          type: string
        eventCount:
          type: integer
        totalRevenueCop:
          type: number
        totalTopupsCop:
          type: number
        totalUnclaimedCop:
          type: number
        totalAttendees:
          type: integer
        events:
          type: array
          items:
            type: object
            required: [id, name, active]
            properties:
              id:
                type: string
              name:
                type: string
              active:
                type: boolean

    # ── Events ────────────────────────────────────────────────────────────────
    Event:
      type: object
      required: [id, name, active, createdAt]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: [string, 'null']
        venueAddress:
          type: [string, 'null']
        startsAt:
          type: [string, 'null']
          format: date-time
        endsAt:
          type: [string, 'null']
          format: date-time
        active:
          type: boolean
        inventoryMode:
          $ref: '#/components/schemas/InventoryMode'
        createdAt:
          type: string
          format: date-time

    CreateEventBody:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        venueAddress:
          type: string
        startsAt:
          type: string
          format: date-time
        endsAt:
          type: string
          format: date-time
        inventoryMode:
          $ref: '#/components/schemas/InventoryMode'

    UpdateEventBody:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        venueAddress:
          type: string
        startsAt:
          type: string
          format: date-time
        endsAt:
          type: string
          format: date-time
        active:
          type: boolean
        inventoryMode:
          $ref: '#/components/schemas/InventoryMode'

    # ── Bracelets ─────────────────────────────────────────────────────────────
    Bracelet:
      type: object
      required: [id, nfcUid, lastKnownBalanceCop, lastCounter, flagged, createdAt]
      properties:
        id:
          type: string
        nfcUid:
          type: string
        eventId:
          type: [string, 'null']
        attendeeName:
          type: [string, 'null']
        phone:
          type: [string, 'null']
        email:
          type: [string, 'null']
        lastKnownBalanceCop:
          type: integer
        lastCounter:
          type: integer
        flagged:
          type: boolean
        flagReason:
          type: [string, 'null']
        createdAt:
          type: string
          format: date-time

    RegisterBraceletBody:
      type: object
