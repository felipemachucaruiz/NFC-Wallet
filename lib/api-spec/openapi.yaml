        nfcUid:
          type: string
        eventId:
          type: [string, 'null']
        attendeeName:
          type: [string, 'null']
        phone:
          type: [string, 'null']
        email:
          type: [string, 'null']
        lastKnownBalanceCop:
          type: integer
        lastCounter:
          type: integer
        flagged:
          type: boolean
