            type: integer

    # ── Merchants ─────────────────────────────────────────────────────────────
    Merchant:
      type: object
      required: [id, eventId, name, commissionRatePercent, active, createdAt]
      properties:
        id:
          type: string
        eventId:
          type: string
        name:
          type: string
        description:
          type: [string, 'null']
        commissionRatePercent:
          type: string
        merchantType:
          $ref: '#/components/schemas/MerchantType'
        active:
          type: boolean
        createdAt:
          type: string
          format: date-time

    CreateMerchantBody:
      type: object
      required: [eventId, name, commissionRatePercent]
      properties:
        eventId:
          type: string
        name:
          type: string
          minLength: 1
        description:
          type: string
        commissionRatePercent:
          type: string
          pattern: '^\d+(\.\d{1,2})?$'
        merchantType:
          $ref: '#/components/schemas/MerchantType'

    UpdateMerchantBody:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        commissionRatePercent:
          type: string
          pattern: '^\d+(\.\d{1,2})?$'
        merchantType:
          $ref: '#/components/schemas/MerchantType'
