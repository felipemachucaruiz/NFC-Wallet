    Location:
      type: object
      required: [id, merchantId, eventId, name, active, createdAt]
      properties:
        id:
          type: string
        merchantId:
          type: string
        eventId:
          type: string
        name:
          type: string
        active:
          type: boolean
        createdAt:
          type: string
          format: date-time

    CreateLocationBody:
      type: object
      required: [merchantId, eventId, name]
      properties:
        merchantId:
          type: string
        eventId:
          type: string
        name:
          type: string
          minLength: 1

    UpdateLocationBody:
      type: object
      properties:
