          type: [string, 'null']
        priceCop:
          type: integer
        costCop:
          type: integer
        active:
          type: boolean
        createdAt:
          type: string
          format: date-time

    CreateProductBody:
      type: object
      required: [merchantId, name, priceCop]
      properties:
        merchantId:
          type: string
        name:
          type: string
          minLength: 1
        category:
          type: string
        priceCop:
          type: integer
