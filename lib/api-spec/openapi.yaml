      required: [transactions, total, page, limit]
      properties:
        transactions:
          type: array
          items:
            $ref: '#/components/schemas/EventTransaction'
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    CreateAccountBody:
      type: object
      required: [firstName, password, role]
      properties:
        firstName:
          type: string
          minLength: 1
        lastName:
          type: string
        email:
          type: string
          format: email
        username:
          type: string
          minLength: 3
        password:
          type: string
          minLength: 6
        role:
          $ref: '#/components/schemas/UserRole'
        eventId:
          type: string
        gateZoneId:
          type: [string, 'null']
        merchantId:
          type: [string, 'null']

    AccessZone:
      type: object
      required: [id, eventId, name, rank, createdAt]
      properties:
        id:
          type: string
        eventId:
          type: string
        name:
          type: string
        description:
          type: [string, 'null']
        colorHex:
          type: [string, 'null']
        rank:
          type: integer
        upgradePrice:
          type: [integer, 'null']
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateAccessZoneBody:
      type: object
      required: [name, rank]
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        colorHex:
          type: string
        rank:
          type: integer
          minimum: 0
        upgradePrice:
          type: [integer, 'null']

    UpdateAccessZoneBody:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        colorHex:
          type: string
        rank:
          type: integer
          minimum: 0
        upgradePrice:
          type: [integer, 'null']
