openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Contactless cashless event payment system API (Colombia market)
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: Auth
    description: Browser and mobile authentication endpoints.
  - name: Bracelets
    description: NFC bracelet registration and lookup.
  - name: TopUps
    description: Bank-initiated bracelet top-ups.
  - name: Transactions
    description: Merchant purchase transactions.
  - name: Events
    description: Event management.
  - name: Merchants
    description: Merchant management.
  - name: Locations
    description: Merchant location management.
  - name: Products
    description: Product catalog management.
  - name: Inventory
    description: Location and warehouse inventory.
  - name: StockMovements
    description: Warehouse dispatches, location transfers, and movement history.
  - name: RestockOrders
    description: Automatic restock order management.
  - name: Payouts
    description: Merchant payout management.
  - name: Reports
    description: Revenue and operational reports.
  - name: Users
    description: User and role management.
  - name: Refunds
    description: Bracelet refund processing and unclaimed balance reports.
  - name: PromoterCompanies
    description: Promoter company management and consolidated metrics.
  - name: Analytics
    description: Real-time analytics dashboards for event admins and platform admins.

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'

  /auth/signing-key:
    get:
      tags: [Auth]
      operationId: getSigningKey
      summary: Get the HMAC signing key (bank, merchant_staff, merchant_admin, admin only)
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Signing key returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SigningKeyResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.

  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: iss
          in: query
          required: false
          schema:
            type: string
            format: uri
      responses:
        '302':
          description: Redirect to returnTo path on success or /api/login on failure.

  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '302':
          description: Redirect to the OIDC provider logout URL.

  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'

  # ── Users ────────────────────────────────────────────────────────────────────
  /users:
    get:
      tags: [Users]
      operationId: listUsers
      summary: List all users (admin only)
      responses:
        '200':
          description: List of users.
          content:
            application/json:
              schema:
                type: object
                required: [users]
                properties:
                  users:
                    type: array
                    items:
                      $ref: '#/components/schemas/UserProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /users/{userId}/role:
    patch:
      tags: [Users]
      operationId: updateUserRole
      summary: Update a user's role (admin only)
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRoleBody'
      responses:
        '200':
          description: Role updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Merchant Staff ───────────────────────────────────────────────────────────
  /merchant/staff:
    get:
      tags: [Users]
      operationId: listMerchantStaff
      summary: List merchant_staff for the logged-in merchant_admin
      responses:
        '200':
          description: List of staff members.
          content:
            application/json:
              schema:
                type: object
                required: [staff]
                properties:
                  staff:
                    type: array
                    items:
                      $ref: '#/components/schemas/UserProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [Users]
      operationId: createMerchantStaff
      summary: Create a new merchant_staff user for the logged-in merchant_admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                  minLength: 3
                password:
                  type: string
                  minLength: 6
                firstName:
                  type: string
                lastName:
                  type: string
      responses:
        '201':
          description: Staff member created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: Username already taken.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /merchant/staff/{userId}/password:
    patch:
      tags: [Users]
      operationId: resetMerchantStaffPassword
      summary: Reset password for a merchant_staff member
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [newPassword]
              properties:
                newPassword:
                  type: string
                  minLength: 6
      responses:
        '200':
          description: Password reset.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /merchant/staff/{userId}:
    delete:
      tags: [Users]
      operationId: deleteMerchantStaff
      summary: Remove a merchant_staff member from the merchant
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Staff member removed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Events ───────────────────────────────────────────────────────────────────
  /events:
    get:
      tags: [Events]
      operationId: listEvents
      summary: List all events
      parameters:
        - name: promoterCompanyId
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: List of events.
          content:
            application/json:
              schema:
                type: object
                required: [events]
                properties:
                  events:
                    type: array
                    items:
                      $ref: '#/components/schemas/Event'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Events]
      operationId: createEvent
      summary: Create a new event (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEventBody'
      responses:
        '201':
          description: Event created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /events/{eventId}:
    get:
      tags: [Events]
      operationId: getEvent
      summary: Get event details
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Event details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Events]
      operationId: updateEvent
      summary: Update event (admin only)
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEventBody'
      responses:
        '200':
          description: Event updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Promoter Companies ───────────────────────────────────────────────────────
  /promoter-companies:
    get:
      tags: [PromoterCompanies]
      operationId: listPromoterCompanies
      summary: List all promoter companies (admin or event_admin)
      responses:
        '200':
          description: List of promoter companies.
          content:
            application/json:
              schema:
                type: object
                required: [companies]
                properties:
                  companies:
                    type: array
                    items:
                      $ref: '#/components/schemas/PromoterCompany'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [PromoterCompanies]
      operationId: createPromoterCompany
      summary: Create a promoter company (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertPromoterCompanyBody'
      responses:
        '201':
          description: Promoter company created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromoterCompany'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /promoter-companies/{id}:
    get:
      tags: [PromoterCompanies]
      operationId: getPromoterCompany
      summary: Get a promoter company by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Promoter company details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromoterCompany'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [PromoterCompanies]
      operationId: updatePromoterCompany
      summary: Update a promoter company (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertPromoterCompanyBody'
      responses:
        '200':
          description: Promoter company updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromoterCompany'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [PromoterCompanies]
      operationId: deletePromoterCompany
      summary: Delete a promoter company (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Promoter company deleted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /promoter-companies/{id}/summary:
    get:
      tags: [PromoterCompanies]
      operationId: getPromoterCompanySummary
      summary: Get consolidated metrics for all events of a promoter company
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Consolidated summary of promoter company metrics.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromoterCompanySummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Bracelets ────────────────────────────────────────────────────────────────
  /bracelets:
    post:
      tags: [Bracelets]
      operationId: registerBracelet
      summary: Register a new bracelet (bank or admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterBraceletBody'
      responses:
        '201':
          description: Bracelet registered.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Bracelet'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'

  /bracelets/{nfcUid}:
    get:
      tags: [Bracelets]
      operationId: getBracelet
      summary: Look up a bracelet by NFC UID
      parameters:
        - name: nfcUid
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Bracelet data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Bracelet'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Bracelets]
      operationId: updateBraceletContact
      summary: Update bracelet contact info (bank or admin)
      parameters:
        - name: nfcUid
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBraceletContactBody'
      responses:
        '200':
          description: Bracelet updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Bracelet'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /admin/bracelets/{nfcUid}/unflag:
    patch:
      tags: [Bracelets]
      operationId: unflagBracelet
      summary: Remove tamper flag from a bracelet (admin only)
      parameters:
        - name: nfcUid
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Bracelet unflagged.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Bracelet'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /admin/bracelets/{nfcUid}:
    delete:
      tags: [Bracelets]
      operationId: deleteAdminBracelet
      summary: Hard-delete a bracelet (admin only; transactions preserved)
      parameters:
        - name: nfcUid
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Bracelet deleted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Refunds ──────────────────────────────────────────────────────────────────
  /refunds:
    post:
      tags: [Refunds]
      operationId: createRefund
      summary: Issue a bracelet refund (bank or admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRefundBody'
      responses:
        '201':
          description: Refund issued and bracelet balance zeroed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefundResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /events/{eventId}/unclaimed-balances:
    get:
      tags: [Refunds]
      operationId: getUnclaimedBalances
      summary: Bracelets with remaining balance for an event (event_admin or admin)
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of bracelets with unclaimed balances.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnclaimedBalancesResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /events/{eventId}/bracelets:
    get:
      tags: [Events]
      operationId: listEventBracelets
      summary: List all bracelets for an event (event_admin or admin)
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: search
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Paginated list of bracelets for the event.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListEventBracelets200'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /events/{eventId}/transactions:
    get:
      tags: [Events]
      operationId: listEventTransactions
      summary: List all transactions for an event (event_admin or admin)
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: merchantId
          in: query
          schema:
            type: string
        - name: search
          in: query
          description: Filter by bracelet UID or merchant name
          schema:
            type: string
      responses:
        '200':
          description: Paginated list of transactions for the event.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListEventTransactions200'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Top-ups ──────────────────────────────────────────────────────────────────
  /topups:
    post:
      tags: [TopUps]
      operationId: createTopUp
      summary: Bank-initiated bracelet top-up
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTopUpBody'
      responses:
        '201':
          description: Top-up recorded. Returns signed bracelet payload to write to NFC tag.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TopUpResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /topups/my-shift:
    get:
      tags: [TopUps]
      operationId: getMyShiftTopUps
      summary: Today's top-ups by the authenticated bank user
      responses:
        '200':
          description: Shift summary with top-ups and totals by payment method.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShiftTopUpSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  # ── Merchants ────────────────────────────────────────────────────────────────
  /merchants:
    get:
      tags: [Merchants]
      operationId: listMerchants
      summary: List merchants
      parameters:
        - name: eventId
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: List of merchants.
          content:
            application/json:
              schema:
                type: object
                required: [merchants]
                properties:
                  merchants:
                    type: array
                    items:
                      $ref: '#/components/schemas/Merchant'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Merchants]
      operationId: createMerchant
      summary: Create a new merchant (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMerchantBody'
      responses:
        '201':
          description: Merchant created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Merchant'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
