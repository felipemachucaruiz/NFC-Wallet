    RefundMethod:
      type: string
      enum: [cash, nequi, bancolombia, other]

    Refund:
      type: object
      required: [id, braceletUid, eventId, amountCop, refundMethod, performedByUserId, createdAt]
      properties:
        id:
          type: string
        braceletUid:
          type: string
        eventId:
          type: string
        amountCop:
          type: integer
        refundMethod:
