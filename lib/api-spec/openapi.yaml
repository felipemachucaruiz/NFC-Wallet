      summary: Update an access zone
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
        - name: zoneId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAccessZoneBody'
      responses:
        '200':
          description: Access zone updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessZone'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
    delete:
      tags: [AccessZones]
      operationId: deleteAccessZone
      summary: Delete an access zone
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
        - name: zoneId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Access zone deleted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  # ── Push Tokens ───────────────────────────────────────────────────────────────
  /push-token:
    post:
      tags: [PushTokens]
      operationId: registerPushToken
      summary: Register Expo push notification token for the authenticated user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterPushTokenBody'
      responses:
        '200':
          description: Push token registered.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string

  responses:
    BadRequest:
      description: Invalid request body or parameters.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Unauthorized:
      description: Not authenticated.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Forbidden:
      description: Insufficient permissions.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Conflict:
      description: Resource already exists.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    InternalError:
      description: Internal server error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'

  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string

    SuccessEnvelope:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          const: true

    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          const: true

    # ── Auth ──────────────────────────────────────────────────────────────────
    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl, role]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
          format: email
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']
        role:
          $ref: '#/components/schemas/UserRole'
        merchantId:
          type: [string, 'null']
          description: Set for merchant_admin and merchant_staff users; determines ownership scope
        eventId:
          type: [string, 'null']
          description: Set for event_admin users; determines which event they administer
        promoterCompanyId:
          type: [string, 'null']
          description: Set for event_admin users linked to a promoter company; determines which company's events they manage
        merchantName:
          type: [string, 'null']
          description: Display name of the merchant (merchant_admin / merchant_staff only)
        merchantType:
          type: [string, 'null']
          description: Merchant type (event_managed or external)
        eventName:
          type: [string, 'null']
          description: Display name of the event (event_admin / gate users)
        gateZoneId:
          type: [string, 'null']
          description: ID of the gate zone this gate user is assigned to

    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'

    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
          minLength: 1
        code_verifier:
          type: string
          minLength: 1
        redirect_uri:
          type: string
          minLength: 1
          format: uri
        state:
          type: string
          minLength: 1
        nonce:
          type: string
          minLength: 1

    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string

    SigningKeyResponse:
      type: object
      required: [hmacSecret]
      properties:
        hmacSecret:
          type: string

    # ── Roles & Users ─────────────────────────────────────────────────────────
    UserRole:
      type: string
      enum: [attendee, bank, gate, merchant_staff, merchant_admin, warehouse_admin, event_admin, admin]

    InventoryMode:
      type: string
      enum: [location_based, centralized_warehouse]

    MerchantType:
      type: string
      enum: [event_managed, external]

    UserProfile:
      type: object
      required: [id, role, createdAt]
      properties:
        id:
          type: string
        username:
          type: [string, 'null']
        email:
          type: [string, 'null']
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']
        role:
          $ref: '#/components/schemas/UserRole'
        eventId:
          type: [string, 'null']
        merchantId:
          type: [string, 'null']
        promoterCompanyId:
          type: [string, 'null']
        gateZoneId:
          type: [string, 'null']
        isBlocked:
          type: boolean
        isSuspended:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: [string, 'null']
          format: date-time

    UpdateUserRoleBody:
      type: object
      required: [role]
      properties:
        role:
          $ref: '#/components/schemas/UserRole'

    SuccessResponse:
      type: object
      required: [success]
      properties:
        success:
          type: boolean

    # ── Promoter Companies ────────────────────────────────────────────────────
    PromoterCompany:
      type: object
      required: [id, companyName, createdAt, updatedAt]
      properties:
        id:
          type: string
        companyName:
          type: string
        nit:
          type: [string, 'null']
        address:
          type: [string, 'null']
        phone:
          type: [string, 'null']
        email:
          type: [string, 'null']
          format: email
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    UpsertPromoterCompanyBody:
      type: object
      required: [companyName]
      properties:
        companyName:
          type: string
          minLength: 1
        nit:
          type: string
        address:
          type: string
        phone:
          type: string
        email:
          type: string
          format: email

    PromoterCompanySummary:
      type: object
      required: [companyId, companyName, eventCount, totalRevenue, totalTopups, totalUnclaimed, totalAttendees]
      properties:
        companyId:
          type: string
        companyName:
          type: string
        eventCount:
          type: integer
        totalRevenue:
          type: number
        totalTopups:
          type: number
        totalUnclaimed:
          type: number
        totalAttendees:
          type: integer
        events:
          type: array
          items:
            type: object
            required: [id, name, active]
            properties:
              id:
                type: string
              name:
                type: string
              active:
                type: boolean

    # ── Events ────────────────────────────────────────────────────────────────
    Event:
      type: object
      required: [id, name, active, currencyCode, createdAt]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: [string, 'null']
        venueAddress:
          type: [string, 'null']
        startsAt:
          type: [string, 'null']
          format: date-time
        endsAt:
          type: [string, 'null']
          format: date-time
        active:
          type: boolean
        currencyCode:
          type: string
          enum: [COP, MXN, CLP, ARS, PEN, UYU, BOB, BRL, USD]
          default: COP
        inventoryMode:
          $ref: '#/components/schemas/InventoryMode'
        createdAt:
          type: string
          format: date-time

    CreateEventBody:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        venueAddress:
          type: string
        currencyCode:
          type: string
          enum: [COP, MXN, CLP, ARS, PEN, UYU, BOB, BRL, USD]
          default: COP
        startsAt:
          type: string
          format: date-time
        endsAt:
          type: string
          format: date-time
        inventoryMode:
          $ref: '#/components/schemas/InventoryMode'

    UpdateEventBody:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        venueAddress:
          type: string
        currencyCode:
          type: string
          enum: [COP, MXN, CLP, ARS, PEN, UYU, BOB, BRL, USD]
        startsAt:
          type: string
          format: date-time
        endsAt:
          type: string
          format: date-time
        active:
          type: boolean
        inventoryMode:
          $ref: '#/components/schemas/InventoryMode'

    # ── Bracelets ─────────────────────────────────────────────────────────────
    Bracelet:
      type: object
      required: [id, nfcUid, lastKnownBalance, lastCounter, flagged, createdAt]
      properties:
        id:
          type: string
        nfcUid:
          type: string
        eventId:
          type: [string, 'null']
        attendeeName:
          type: [string, 'null']
        phone:
          type: [string, 'null']
        email:
          type: [string, 'null']
        lastKnownBalance:
          type: integer
        lastCounter:
          type: integer
        flagged:
          type: boolean
        flagReason:
          type: [string, 'null']
        createdAt:
          type: string
          format: date-time

    RegisterBraceletBody:
      type: object
      required: [nfcUid]
      properties:
        nfcUid:
          type: string
          minLength: 1
        eventId:
          type: string
        attendeeName:
          type: string
        phone:
          type: string
        email:
          type: string

    UpdateBraceletContactBody:
      type: object
      properties:
        attendeeName:
          type: string
        phone:
          type: string
        email:
          type: string

    RefundMethod:
      type: string
      enum: [cash, nequi, bancolombia, other]

    Refund:
      type: object
      required: [id, braceletUid, eventId, amount, refundMethod, performedByUserId, createdAt]
      properties:
        id:
          type: string
        braceletUid:
          type: string
        eventId:
          type: string
        amount:
          type: integer
        refundMethod:
          $ref: '#/components/schemas/RefundMethod'
        notes:
          type: [string, 'null']
        performedByUserId:
          type: string
        createdAt:
          type: string
          format: date-time

    CreateRefundBody:
      type: object
      required: [braceletUid, refundMethod]
      properties:
        braceletUid:
          type: string
          minLength: 1
        refundMethod:
          $ref: '#/components/schemas/RefundMethod'
        notes:
          type: string
        newCounter:
          type: integer
          description: Updated counter after NFC write (for bracelet sync)
        newBalance:
          type: integer
          description: New bracelet balance after refund (typically 0)

    RefundResult:
      type: object
      required: [refund, amount]
      properties:
        refund:
          $ref: '#/components/schemas/Refund'
        amount:
          type: integer

    UnclaimedBracelet:
      type: object
      required: [id, nfcUid, lastKnownBalance, lastCounter, flagged, createdAt]
      properties:
        id:
          type: string
        nfcUid:
          type: string
        eventId:
          type: [string, 'null']
        attendeeName:
          type: [string, 'null']
        phone:
          type: [string, 'null']
        email:
          type: [string, 'null']
        lastKnownBalance:
          type: integer
        lastCounter:
          type: integer
        flagged:
          type: boolean
        flagReason:
          type: [string, 'null']
        createdAt:
          type: string
          format: date-time
        latestRefund:
          oneOf:
            - $ref: '#/components/schemas/Refund'
            - type: 'null'

    UnclaimedBalancesResponse:
      type: object
      required: [bracelets, totalUnclaimed]
      properties:
        bracelets:
          type: array
          items:
            $ref: '#/components/schemas/UnclaimedBracelet'
        totalUnclaimed:
          type: integer

    # ── Top-Ups ───────────────────────────────────────────────────────────────
    PaymentMethod:
      type: string
      enum: [cash, card_external, nequi_transfer, bancolombia_transfer, other]

    TopUp:
      type: object
      required: [id, braceletUid, amount, paymentMethod, status, newBalance, newCounter, createdAt]
      properties:
        id:
          type: string
        braceletUid:
          type: string
        amount:
          type: integer
        paymentMethod:
          $ref: '#/components/schemas/PaymentMethod'
        performedByUserId:
          type: string
        wompiTransactionId:
          type: [string, 'null']
        status:
          type: string
          enum: [pending, completed, failed]
        newBalance:
          type: integer
        newCounter:
          type: integer
        createdAt:
          type: string
          format: date-time

    CreateTopUpBody:
      type: object
      required: [nfcUid, amount, paymentMethod]
      properties:
        nfcUid:
          type: string
          minLength: 1
        amount:
          type: integer
          minimum: 1
        paymentMethod:
          $ref: '#/components/schemas/PaymentMethod'
        wompiTransactionId:
          type: string

    TopUpResult:
      type: object
      required: [topUp, signedPayload]
      properties:
        topUp:
          $ref: '#/components/schemas/TopUp'
        signedPayload:
          $ref: '#/components/schemas/SignedBraceletPayload'

    SignedBraceletPayload:
      type: object
      required: [balance, counter, hmac]
      properties:
        balance:
          type: integer
        counter:
          type: integer
        hmac:
          type: string

    ShiftTopUpSummary:
      type: object
      required: [topUps, total, byPaymentMethod]
      properties:
        topUps:
          type: array
          items:
            $ref: '#/components/schemas/TopUp'
        total:
          type: integer
        byPaymentMethod:
          type: object
          additionalProperties:
            type: integer

    # ── Merchants ─────────────────────────────────────────────────────────────
    Merchant:
      type: object
      required: [id, eventId, name, commissionRatePercent, active, createdAt, retencionFuenteRate, retencionICARate]
      properties:
        id:
          type: string
        eventId:
          type: string
        name:
          type: string
        description:
          type: [string, 'null']
        commissionRatePercent:
          type: string
        merchantType:
          $ref: '#/components/schemas/MerchantType'
        active:
          type: boolean
        retencionFuenteRate:
          type: string
          description: "Porcentaje de retención en la fuente (ej: '3.50')"
        retencionICARate:
          type: string
          description: "Tasa de retención ICA del municipio (ej: '0.9660')"
        createdAt:
          type: string
          format: date-time

    CreateMerchantBody:
      type: object
      required: [eventId, name, commissionRatePercent]
      properties:
        eventId:
          type: string
        name:
          type: string
          minLength: 1
        description:
          type: string
        commissionRatePercent:
          type: string
          pattern: '^\d+(\.\d{1,2})?$'
        merchantType:
          $ref: '#/components/schemas/MerchantType'
        retencionFuenteRate:
          type: string
          pattern: '^\d+(\.\d{1,2})?$'
        retencionICARate:
          type: string
          pattern: '^\d+(\.\d{1,4})?$'

    UpdateMerchantBody:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        commissionRatePercent:
          type: string
          pattern: '^\d+(\.\d{1,2})?$'
        merchantType:
          $ref: '#/components/schemas/MerchantType'
        active:
          type: boolean
        retencionFuenteRate:
          type: string
          pattern: '^\d+(\.\d{1,2})?$'
        retencionICARate:
          type: string
          pattern: '^\d+(\.\d{1,4})?$'

    MerchantEarnings:
      type: object
      required: [merchantId, grossSales, cogs, grossProfit, profitMarginPercent, marginPercent, totalCommission, netEarned, totalPaidOut, pending, totalIva, totalRetencionFuente, totalRetencionICA, totalRetenciones, totalNeto]
      properties:
        merchantId:
          type: string
        grossSales:
          type: integer
        cogs:
          type: integer
        grossProfit:
          type: integer
        profitMarginPercent:
          type: number
        marginPercent:
          type: number
          description: Alias for profitMarginPercent
        totalCommission:
          type: integer
        netEarned:
          type: integer
        totalPaidOut:
          type: integer
        pending:
          type: integer
        totalIva:
          type: integer
          description: Total IVA recaudado en ventas
        totalRetencionFuente:
          type: integer
          description: Total retención en la fuente aplicada
        totalRetencionICA:
          type: integer
          description: Total retención de ICA aplicada
        totalRetenciones:
          type: integer
          description: Total retenciones (fuente + ICA)
        totalNeto:
          type: integer
          description: Neto efectivo para el merchant (bruto - comisión - retenciones)
        payouts:
          type: array
          items:
            $ref: '#/components/schemas/MerchantPayout'

    # ── Locations ─────────────────────────────────────────────────────────────
    Location:
      type: object
      required: [id, merchantId, eventId, name, active, createdAt]
      properties:
        id:
          type: string
        merchantId:
          type: string
        eventId:
          type: string
        name:
          type: string
        active:
          type: boolean
        createdAt:
          type: string
          format: date-time

    CreateLocationBody:
      type: object
      required: [merchantId, eventId, name]
      properties:
        merchantId:
          type: string
        eventId:
          type: string
        name:
          type: string
          minLength: 1

    UpdateLocationBody:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        active:
          type: boolean

    AssignUserToLocationBody:
      type: object
      required: [userId]
      properties:
        userId:
          type: string

    # ── Products ──────────────────────────────────────────────────────────────
    Product:
      type: object
      required: [id, merchantId, name, price, cost, active, createdAt, ivaRate, ivaExento]
      properties:
        id:
          type: string
        merchantId:
          type: string
        name:
          type: string
        category:
          type: [string, 'null']
        barcode:
          type: [string, 'null']
          description: "Optional barcode for PDA hardware scanner lookup"
        price:
          type: integer
        cost:
          type: integer
        ivaRate:
          type: string
          description: "Porcentaje de IVA aplicable al producto (ej: '19.00')"
        ivaExento:
          type: boolean
          description: "True si el producto está excluido de IVA (canasta básica, etc.)"
        active:
          type: boolean
        createdAt:
          type: string
          format: date-time

    CreateProductBody:
      type: object
      required: [merchantId, name, price]
      properties:
        merchantId:
          type: string
        name:
          type: string
          minLength: 1
        category:
          type: string
        barcode:
          type: string
          description: "Optional barcode for PDA hardware scanner lookup"
        price:
          type: integer
          minimum: 0
        cost:
          type: integer
          minimum: 0
        ivaRate:
          type: string
          pattern: '^\d+(\.\d{1,2})?$'
          description: "Tasa de IVA en porcentaje"
        ivaExento:
          type: boolean
          description: "Producto excluido de IVA"

    UpdateProductBody:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        category:
          type: string
        barcode:
          type: [string, 'null']
          description: "Optional barcode for PDA hardware scanner lookup"
        imageUrl:
          type: [string, 'null']
          description: "Product image URL (null to remove)"
        price:
          type: integer
          minimum: 0
        cost:
          type: integer
          minimum: 0
        active:
          type: boolean
        ivaRate:
          type: string
          pattern: '^\d+(\.\d{1,2})?$'
          description: "Tasa de IVA en porcentaje"
        ivaExento:
          type: boolean
          description: "Producto excluido de IVA"

    # ── Inventory ─────────────────────────────────────────────────────────────
    LocationInventoryItem:
      type: object
      required: [id, locationId, productId, quantityOnHand, restockTrigger, restockTargetQty]
      properties:
        id:
          type: string
        locationId:
          type: string
        productId:
          type: string
        product:
          $ref: '#/components/schemas/Product'
        quantityOnHand:
          type: integer
        restockTrigger:
          type: integer
        restockTargetQty:
          type: integer

    UpdateLocationInventoryBody:
      type: object
      required: [productId]
      properties:
        productId:
          type: string
        restockTrigger:
          type: integer
          minimum: 0
        restockTargetQty:
          type: integer
          minimum: 0
        quantityAdjustment:
          type: integer

    WarehouseInventoryItem:
      type: object
      required: [id, warehouseId, productId, quantityOnHand]
      properties:
        id:
          type: string
        warehouseId:
          type: string
        productId:
          type: string
        product:
          $ref: '#/components/schemas/Product'
        quantityOnHand:
          type: integer

    UpdateWarehouseInventoryBody:
      type: object
      required: [productId, quantityDelta]
      properties:
        productId:
          type: string
        quantityDelta:
          type: integer

    Warehouse:
      type: object
      required: [id, eventId, name, createdAt]
      properties:
        id:
          type: string
        eventId:
          type: string
        name:
          type: string
        notes:
          type: [string, 'null']
        createdAt:
          type: string
          format: date-time

    CreateWarehouseBody:
      type: object
      required: [eventId, name]
      properties:
        eventId:
          type: string
        name:
          type: string
          minLength: 1
        notes:
          type: string

    # ── Inventory Audits & Damaged Goods ─────────────────────────────────────
    CreateInventoryAuditBody:
      type: object
      required: [items]
      properties:
        warehouseId:
          type: string
        locationId:
          type: string
        notes:
          type: string
