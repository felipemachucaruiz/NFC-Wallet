name: Build & Push Local Server Image

on:
  push:
    branches: [master]
    paths:
      - "artifacts/api-server/**"
      - "lib/db/**"
      - "lib/api-zod/**"
      - "local-server/Dockerfile"
      - ".github/workflows/build-local-server.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: local-server/Dockerfile
          push: true
          tags: ghcr.io/felipemachucaruiz/tapee-local:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
