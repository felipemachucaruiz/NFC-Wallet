kind = "web"
previewPath = "/web-admin/"
title = "Tapee Admin Portal"
version = "1.0.0"
id = "artifacts/web-admin"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/web-admin/" ]
localPort = 20595

[services.development]
run = "pnpm --filter @workspace/web-admin run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/web-admin", "run", "build" ]
publicDir = "artifacts/web-admin/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20595"
BASE_PATH = "/web-admin/"
