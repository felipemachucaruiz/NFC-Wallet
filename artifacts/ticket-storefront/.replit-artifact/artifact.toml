kind = "web"
previewPath = "/ticket-storefront/"
title = "Tapee Ticket Storefront"
version = "1.0.0"
id = "artifacts/ticket-storefront"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/ticket-storefront/" ]
localPort = 23559

[services.development]
run = "pnpm --filter @workspace/ticket-storefront run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ticket-storefront", "run", "build" ]
publicDir = "artifacts/ticket-storefront/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23559"
BASE_PATH = "/ticket-storefront/"
