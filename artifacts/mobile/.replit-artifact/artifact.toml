kind = "mobile"
previewPath = "/mobile/"
title = "Cashless Event App"
version = "1.0.0"
id = "artifacts/mobile"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
name = "expo"
paths = [ "/mobile/" ]
localPort = 18115

[services.development]
run = "fuser -k 18115/tcp 2>/dev/null || true; sleep 1; pnpm --filter @workspace/mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/mobile", "run", "serve" ]

[services.env]
PORT = "18115"
BASE_PATH = "/mobile/"
