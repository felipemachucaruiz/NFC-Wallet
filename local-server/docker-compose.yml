services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tapee
      POSTGRES_PASSWORD: tapee_local
      POSTGRES_DB: tapee
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tapee"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: ghcr.io/felipemachucaruiz/tapee-local:latest
    ports:
      - "3001:3001"
    environment:
      PORT: "3001"
      DATABASE_URL: postgres://tapee:tapee_local@postgres:5432/tapee
      # local: disables HTTPS guard on signing-key, skips device attestation,
      # and opens CORS — appropriate for a trusted on-site network.
      NODE_ENV: local
      SESSION_SECRET: ${SESSION_SECRET}
      HMAC_SECRET: ${HMAC_SECRET}
      HMAC_MASTER_KEY: ${HMAC_MASTER_KEY:-}
      DEMO_SECRET: ${DEMO_SECRET:-}
      LOCAL_SERVER_NAME: ${LOCAL_SERVER_NAME:-}
      # Optional: sync event data and balances from Railway
      RAILWAY_SYNC_URL: ${RAILWAY_SYNC_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
